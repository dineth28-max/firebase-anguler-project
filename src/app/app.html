<main class="page">
	<section class="todo-card">
		<p class="eyebrow">Angular</p>
		<h1>{{ title() }}</h1>
		<p class="subtitle">Add a task, mark it complete, or remove it when you are done.</p>

		<div class="todo-form">
			<input #todoInput type="text" placeholder="What needs to be done?" (keydown.enter)="addTodo(todoInput)" />
			<button type="button" (click)="addTodo(todoInput)">Add</button>
		</div>

		<p class="stats">{{ todos().length }} task(s) total</p>

		<ul class="todo-list">
			@for (todo of todos(); track todo.id) {
				<li [class.done]="todo.done">
					<label>
						<input type="checkbox" [checked]="todo.done" (change)="toggleTodo(todo.id)" />
						<span>{{ todo.text }}</span>
					</label>
					<button type="button" class="delete" (click)="deleteTodo(todo.id)">Delete</button>
				</li>
			}
		</ul>
	</section>
</main>
